name: Deploy to Fly
description: >
  Deploy an app to Fly.io. If a Doppler token is provided, also syncs secrets
  from Doppler into the Fly app (importing current keys and unsetting stale
  ones) before deploying.

inputs:
  fly-api-token:
    description: >
      Fly API token. Optional when doppler-token is set AND Doppler holds a
      FLY_API_TOKEN secret — in that case the value is pulled from Doppler.
      Required otherwise. When both are provided, the input wins and a
      ::warning:: is emitted if the values differ.
    required: false
    default: ""
  app-name:
    description: Target Fly app name.
    required: true
  fly-toml:
    description: Path to fly.toml.
    required: false
    default: fly.toml
  dockerfile:
    description: Path to Dockerfile.
    required: false
    default: Dockerfile
  doppler-token:
    description: Doppler API token. If empty, secret sync is skipped entirely.
    required: false
    default: ""
  doppler-project:
    description: Doppler project name. Required when doppler-token is set.
    required: false
  doppler-config:
    description: Doppler config / environment name. Required when doppler-token is set.
    required: false
  extra-secrets:
    description: >
      Additional KEY=VALUE pairs (one per line, dotenv format) to set as Fly
      secrets. Applied after Doppler, so a key here overrides the same key
      from Doppler. Values are not auto-masked — reference them through
      the workflow's secrets context if they're sensitive.
    required: false
    default: ""
  doppler-var-prefix:
    description: >
      When set, only Doppler secrets whose key starts with this prefix are
      forwarded to the Fly app. FLY_API_TOKEN and FLY_ORG_SLUG are always
      included regardless. Example: "GRABBIT_" to pass only GRABBIT_* vars.
      Useful when a shared Doppler config holds secrets for multiple apps.
    required: false
    default: ""
  env:
    description: >
      Newline-separated KEY=VALUE pairs, each forwarded as `--env KEY=VALUE` to
      `flyctl deploy` — plain (non-secret) runtime environment variables on the
      deployed app. Blank lines and `#` comment lines are ignored. Applied after
      the built-in `GIT_REV`, so passing `GIT_REV=...` here overrides it.

      Use this only for non-sensitive values: `--env` vars are stored in the app
      config (visible via `flyctl config`/the Machines API). For secrets use
      `extra-secrets` or Doppler instead.
    required: false
    default: ""
  build-args:
    description: >
      Newline-separated KEY=VALUE pairs, each forwarded as `--build-arg KEY=VALUE` to
      `flyctl deploy`. Blank lines and `#` comment lines are ignored.

      If a VALUE is exactly `$NAME` or `${NAME}`, it is replaced with the value of the
      Doppler/extra secret NAME this action already fetched (no second fetch), so a secret
      can be passed as a build arg without re-declaring it in the workflow. The name must
      resolve or the deploy fails; resolved values are masked in the logs. A literal `$` at
      the start of a value is only kept when it is not a valid `$NAME` reference.
    required: false
    default: ""
  build-secrets:
    description: >
      Newline-separated KEY=VALUE pairs, each forwarded as `--build-secret KEY=VALUE` to
      `flyctl deploy` (a BuildKit secret the Dockerfile reads via `--mount=type=secret,id=KEY`,
      so unlike a build-arg the value never lands in the image or its history). Blank lines and
      `#` comment lines are ignored.

      Values support the same `$NAME` / `${NAME}` reference to a fetched Doppler/extra secret as
      build-args (resolved once, masked in the logs); a literal value is passed through as-is.
      Use this for credentials the build needs, e.g. a read token for a private package registry.
    required: false
    default: ""
  auto-start-machines:
    description: >
      When "true", proactively start any stopped or suspended machines after a
      successful deploy so the app is warm and the first incoming request does not
      pay a cold start. Each machine is started independently and retried with
      backoff. This only starts machines that are not already running; it does not
      edit fly.toml or change the app's autostart/autostop config.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Validate Doppler inputs
      if: inputs.doppler-token != ''
      shell: bash
      run: |
        missing=()
        [ -z "${{ inputs.doppler-project }}" ] && missing+=(doppler-project)
        [ -z "${{ inputs.doppler-config }}" ]  && missing+=(doppler-config)
        if [ ${#missing[@]} -gt 0 ]; then
          echo "doppler-token is set but required inputs are missing: ${missing[*]}"
          exit 1
        fi

    - name: Install doppler-export
      if: inputs.doppler-token != ''
      shell: bash
      run: |
        mkdir -p "$HOME/.local/bin"
        install -m 0755 "$GITHUB_ACTION_PATH/../setup-doppler/doppler-export" "$HOME/.local/bin/doppler-export"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Setup flyctl
      uses: superfly/flyctl-actions/setup-flyctl@master

    - name: Stage secrets
      shell: bash
      env:
        DOPPLER_TOKEN: ${{ inputs.doppler-token }}
        DOPPLER_PROJECT: ${{ inputs.doppler-project }}
        DOPPLER_CONFIG: ${{ inputs.doppler-config }}
        FLY_API_TOKEN_INPUT: ${{ inputs.fly-api-token }}
        EXTRA_SECRETS: ${{ inputs.extra-secrets }}
        DOPPLER_VAR_PREFIX: ${{ inputs.doppler-var-prefix }}
        APP_NAME: ${{ inputs.app-name }}
        BUILD_ARGS_RAW: ${{ inputs.build-args }}
        BUILD_SECRETS_RAW: ${{ inputs.build-secrets }}
      run: |
        set -euo pipefail
        # Resolves FLY_API_TOKEN (input vs Doppler) and exports SECRETS.
        . "$GITHUB_ACTION_PATH/../_lib/load-secrets.sh"

        # Resolve build-args / build-secrets here, where SECRETS (the full dotenv, before the prefix
        # filter below) is in scope. A VALUE of `$NAME`/`${NAME}` is replaced with that secret's
        # value; the result is handed to the Deploy step via $GITHUB_ENV so SECRETS never has to
        # leave this step. Kept ahead of the prefix filter so a reference can name any fetched
        # secret, not just a prefixed one.
        #
        # resolve_refs reads newline KEY=VALUE input, replacing each `$NAME`/`${NAME}` VALUE with the
        # fetched secret (masked), and leaves the resolved text in the RESOLVED global. The add-mask
        # lines go to the step log (stdout), never into RESOLVED / $GITHUB_ENV.
        RESOLVED=""
        resolve_refs() {
          local label=$1 raw=$2 line key val ref enc value
          RESOLVED=""
          while IFS= read -r line || [ -n "$line" ]; do
            if [ -z "$line" ] || [[ "$line" =~ ^[[:space:]]*# ]]; then
              RESOLVED+="$line"$'\n'; continue
            fi
            key=${line%%=*}; val=${line#*=}
            if [[ "$val" =~ ^\$[{]?([A-Za-z_][A-Za-z0-9_]*)[}]?$ ]]; then
              ref=${BASH_REMATCH[1]}
              enc=$(grep -E "^${ref}=" <<<"$SECRETS" | head -n1 || true)
              if [ -z "$enc" ]; then
                echo "::error::${label} '${key}' references \$${ref}, which is not among the loaded secrets" >&2
                exit 1
              fi
              # SECRETS values are dotenv (double-quoted, doppler-export escaping). Strip the quotes
              # and reverse the escaping in one left-to-right pass (every literal backslash was
              # doubled, so there is no ambiguity); \n and \r decode to newline/CR.
              enc=${enc#*=}; enc=${enc#\"}; enc=${enc%\"}
              value=$(printf '%s' "$enc" | perl -pe 's/\\(.)/ $1 eq "n" ? "\n" : ($1 eq "r" ? "\r" : $1) /ge')
              printf '::add-mask::%s\n' "$value"
              RESOLVED+="${key}=${value}"$'\n'
            else
              RESOLVED+="$line"$'\n'
            fi
          done <<<"$raw"
        }

        if [ -n "${BUILD_ARGS_RAW:-}" ]; then
          resolve_refs build-args "$BUILD_ARGS_RAW"
          {
            echo "RESOLVED_BUILD_ARGS<<__DEPLOY_FLY_BUILD_ARGS__"
            printf '%s' "$RESOLVED"
            echo "__DEPLOY_FLY_BUILD_ARGS__"
          } >>"$GITHUB_ENV"
        fi

        if [ -n "${BUILD_SECRETS_RAW:-}" ]; then
          resolve_refs build-secrets "$BUILD_SECRETS_RAW"
          {
            echo "RESOLVED_BUILD_SECRETS<<__DEPLOY_FLY_BUILD_SECRETS__"
            printf '%s' "$RESOLVED"
            echo "__DEPLOY_FLY_BUILD_SECRETS__"
          } >>"$GITHUB_ENV"
        fi

        if [ -n "${DOPPLER_VAR_PREFIX:-}" ]; then
          SECRETS=$(grep -E "^(${DOPPLER_VAR_PREFIX}[A-Za-z0-9_]*=|FLY_API_TOKEN=|FLY_ORG_SLUG=)" <<<"$SECRETS" || true)
        fi

        keys=$(sed -n 's/^\([A-Za-z_][A-Za-z0-9_]*\)=.*/\1/p' <<<"$SECRETS" | sort -u)

        # Stale cleanup only runs when Doppler is the source of truth and we have
        # a non-empty wanted-set — without either, we have no full picture and
        # could wipe manually-set secrets or mass-mark everything as stale.
        if [ -n "$DOPPLER_TOKEN" ] && [ -n "$keys" ]; then
          current=$(flyctl secrets list --app "$APP_NAME" --json | jq -r '.[].name' | sort -u)
          # Guard against jq filter / flyctl schema drift: if the field name
          # changes again, jq -r yields literal "null" strings and we'd "unset"
          # a phantom secret named `null` while the real stale ones slip through.
          if printf '%s\n' "$current" | grep -qx 'null'; then
            echo "::error::flyctl secrets list returned 'null' for a secret name — schema likely changed, refusing to compute stale diff" >&2
            exit 1
          fi
          stale=$(comm -23 <(printf '%s\n' "$current") <(printf '%s\n' "$keys"))
          if [ -n "$stale" ]; then
            echo "Unsetting stale secrets:"
            printf '  %s\n' $stale
            # shellcheck disable=SC2086
            flyctl secrets unset --stage --app "$APP_NAME" $stale
          else
            echo "No stale secrets to unset."
          fi
        fi

        if [ -n "$keys" ]; then
          echo "Importing secrets:"
          printf '  %s\n' $keys
          flyctl secrets import --app "$APP_NAME" --stage <<<"$SECRETS"
        else
          echo "No secrets to import."
        fi

    - name: Deploy
      shell: bash
      env:
        # Resolved by the Stage secrets step ($NAME refs replaced with secret values); falls back to
        # the raw input when that step wrote nothing (no build-args/secrets, or none with refs).
        BUILD_ARGS: ${{ env.RESOLVED_BUILD_ARGS || inputs.build-args }}
        BUILD_SECRETS: ${{ env.RESOLVED_BUILD_SECRETS || inputs.build-secrets }}
        ENV_VARS: ${{ inputs.env }}
      run: |
        set -euo pipefail
        if [ -z "${FLY_API_TOKEN:-}" ]; then
          echo "FLY_API_TOKEN missing — earlier resolution step must have failed." >&2
          exit 1
        fi
        strategy=bluegreen
        volume_count=$(flyctl volumes list --app "${{ inputs.app-name }}" --json 2>/dev/null | jq 'length')
        if [ "${volume_count:-0}" -gt 0 ]; then
          echo "App has $volume_count volume(s) — using rolling strategy (bluegreen incompatible with volumes)."
          strategy=rolling
        fi
        build_arg_flags=()
        if [ -n "$BUILD_ARGS" ]; then
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            build_arg_flags+=(--build-arg "$line")
          done <<<"$BUILD_ARGS"
        fi
        build_secret_flags=()
        if [ -n "$BUILD_SECRETS" ]; then
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            build_secret_flags+=(--build-secret "$line")
          done <<<"$BUILD_SECRETS"
        fi
        # GIT_REV first so a user-supplied GIT_REV in `env` overrides it (last --env wins).
        env_flags=(--env "GIT_REV=$GITHUB_SHA")
        if [ -n "$ENV_VARS" ]; then
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            env_flags+=(--env "$line")
          done <<<"$ENV_VARS"
        fi
        flyctl deploy \
          --app "${{ inputs.app-name }}" \
          --config "${{ inputs.fly-toml }}" \
          --dockerfile "${{ inputs.dockerfile }}" \
          --strategy "$strategy" \
          --local-only \
          "${env_flags[@]}" \
          "${build_arg_flags[@]}" \
          "${build_secret_flags[@]}"

    - name: Start machines
      if: inputs.auto-start-machines == 'true'
      shell: bash
      env:
        APP_NAME: ${{ inputs.app-name }}
      run: |
        set -euo pipefail
        if [ -z "${FLY_API_TOKEN:-}" ]; then
          echo "FLY_API_TOKEN missing — earlier resolution step must have failed." >&2
          exit 1
        fi

        # flyctl / Machines API calls flake on transient 5xx and lease contention,
        # so every network call here runs through retry(): up to 5 tries with
        # exponential backoff (2s, 4s, 8s, 16s). Progress goes to stderr so it
        # never pollutes stdout that a caller captures (e.g. the machine list).
        retry() {
          local max=5 attempt=1 delay=2
          while true; do
            if "$@"; then return 0; fi
            if [ "$attempt" -ge "$max" ]; then
              echo "::error::command failed after ${max} attempts: $*" >&2
              return 1
            fi
            echo "attempt ${attempt}/${max} failed; retrying in ${delay}s: $*" >&2
            sleep "$delay"
            attempt=$((attempt + 1))
            delay=$((delay * 2))
          done
        }

        # A machine can flip to started between the list and the start call (Fly
        # proxy autostart, or another deploy step). Treat "already started" as
        # success so the retry loop doesn't burn attempts and fail on a no-op.
        start_machine() {
          local id=$1 state
          if flyctl machine start "$id" --app "$APP_NAME"; then
            return 0
          fi
          state=$(flyctl machine status "$id" --app "$APP_NAME" --json 2>/dev/null | jq -r '.state // empty')
          [ "$state" = "started" ]
        }

        machines_json=$(retry flyctl machine list --app "$APP_NAME" --json)

        mapfile -t to_start < <(
          jq -r '.[] | select(.state == "stopped" or .state == "suspended") | .id' <<<"$machines_json"
        )

        if [ "${#to_start[@]}" -eq 0 ]; then
          echo "No stopped or suspended machines to start."
          exit 0
        fi

        echo "Starting ${#to_start[@]} machine(s): ${to_start[*]}"
        rc=0
        for id in "${to_start[@]}"; do
          if ! retry start_machine "$id"; then
            rc=1
          fi
        done
        exit "$rc"
