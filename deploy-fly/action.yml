name: Deploy to Fly
description: >
  Deploy an app to Fly.io. If a Doppler token is provided, also syncs secrets
  from Doppler into the Fly app (importing current keys and unsetting stale
  ones) before deploying.

inputs:
  fly-api-token:
    description: >
      Fly API token. Optional when doppler-token is set AND Doppler holds a
      FLY_API_TOKEN secret — in that case the value is pulled from Doppler.
      Required otherwise. When both are provided, the input wins and a
      ::warning:: is emitted if the values differ.
    required: false
    default: ""
  app-name:
    description: Target Fly app name.
    required: true
  fly-toml:
    description: Path to fly.toml.
    required: false
    default: fly.toml
  dockerfile:
    description: Path to Dockerfile.
    required: false
    default: Dockerfile
  doppler-token:
    description: Doppler API token. If empty, secret sync is skipped entirely.
    required: false
    default: ""
  doppler-project:
    description: Doppler project name. Required when doppler-token is set.
    required: false
  doppler-config:
    description: Doppler config / environment name. Required when doppler-token is set.
    required: false
  extra-secrets:
    description: >
      Additional KEY=VALUE pairs (one per line, dotenv format) to set as Fly
      secrets. Applied after Doppler, so a key here overrides the same key
      from Doppler. Values are not auto-masked — reference them through
      the workflow's secrets context if they're sensitive.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Validate Doppler inputs
      if: inputs.doppler-token != ''
      shell: bash
      run: |
        missing=()
        [ -z "${{ inputs.doppler-project }}" ] && missing+=(doppler-project)
        [ -z "${{ inputs.doppler-config }}" ]  && missing+=(doppler-config)
        if [ ${#missing[@]} -gt 0 ]; then
          echo "doppler-token is set but required inputs are missing: ${missing[*]}"
          exit 1
        fi

    - name: Install doppler-export
      if: inputs.doppler-token != ''
      shell: bash
      run: |
        mkdir -p "$HOME/.local/bin"
        install -m 0755 "$GITHUB_ACTION_PATH/../setup-doppler/doppler-export" "$HOME/.local/bin/doppler-export"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Setup flyctl
      uses: superfly/flyctl-actions/setup-flyctl@master

    - name: Stage secrets
      shell: bash
      env:
        DOPPLER_TOKEN: ${{ inputs.doppler-token }}
        DOPPLER_PROJECT: ${{ inputs.doppler-project }}
        DOPPLER_CONFIG: ${{ inputs.doppler-config }}
        FLY_API_TOKEN_INPUT: ${{ inputs.fly-api-token }}
        EXTRA_SECRETS: ${{ inputs.extra-secrets }}
        APP_NAME: ${{ inputs.app-name }}
      run: |
        set -euo pipefail
        # Resolves FLY_API_TOKEN (input vs Doppler) and exports SECRETS.
        . "$GITHUB_ACTION_PATH/../_lib/load-secrets.sh"

        keys=$(sed -n 's/^\([A-Za-z_][A-Za-z0-9_]*\)=.*/\1/p' <<<"$SECRETS" | sort -u)

        # Stale cleanup only runs when Doppler is the source of truth — without it
        # we have no full picture of "wanted" and could wipe manually-set secrets.
        if [ -n "$DOPPLER_TOKEN" ]; then
          current=$(flyctl secrets list --app "$APP_NAME" --json | jq -r '.[].Name' | sort -u)
          stale=$(comm -23 <(printf '%s\n' "$current") <(printf '%s\n' "$keys"))
          if [ -n "$stale" ]; then
            echo "Unsetting stale secrets:"
            printf '  %s\n' $stale
            # shellcheck disable=SC2086
            flyctl secrets unset --stage --app "$APP_NAME" $stale
          else
            echo "No stale secrets to unset."
          fi
        fi

        if [ -n "$keys" ]; then
          flyctl secrets import --app "$APP_NAME" --stage <<<"$SECRETS"
        else
          echo "No secrets to import."
        fi

    - name: Deploy
      shell: bash
      run: |
        if [ -z "${FLY_API_TOKEN:-}" ]; then
          echo "FLY_API_TOKEN missing — earlier resolution step must have failed." >&2
          exit 1
        fi
        flyctl deploy \
          --app "${{ inputs.app-name }}" \
          --config "${{ inputs.fly-toml }}" \
          --dockerfile "${{ inputs.dockerfile }}" \
          --strategy bluegreen \
          --local-only \
          --env "GIT_REV=$GITHUB_SHA"
