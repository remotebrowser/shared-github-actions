name: Prepare a strategy matrix from a selectable entry list
description: >
  Filter a JSON entry list down to user-selected items, or fall back to
  the full list when nothing is selected. Designed to back a
  `prepare-matrix` job whose output feeds `strategy.matrix.include`
  (object array) or `strategy.matrix.<key>` (string array) via
  fromJSON().

inputs:
  entries:
    description: >
      Newline-separated list of JSON-encoded values, one per line.
      Strings must be quoted (`"direct"`); objects use full JSON syntax
      (`{"env":"demo","config":"fly","app_name":"flyfleet"}`). Blank
      lines are ignored. Values are slurped into a JSON array — adding
      or removing an entry is just adding or deleting a line, with no
      commas or brackets to keep balanced.
    required: true
  selections:
    description: >
      Newline-separated list of selected keys (one per line, blank
      lines ignored). Each key is matched against the entry value
      (string array) or the `key-field` of the entry (object array).
      Empty list → fall back to every entry. Typical usage from a
      workflow_dispatch caller is one line per boolean input,
      rendered with a ternary that emits the key name when the input
      is true and an empty string otherwise — see README for an
      example. On push/pull_request events the dispatch inputs are
      empty strings, so every line collapses to blank and the action
      falls back to the full entry list.
    required: false
    default: ""
  key-field:
    description: >
      For object-array entries, the field on each entry to compare
      against each selection key. Omit for string-array entries (the
      entry value itself is compared).
    required: false
    default: ""

outputs:
  matrix:
    description: One-line JSON array (filtered or full).
    value: ${{ steps.filter.outputs.matrix }}

runs:
  using: composite
  steps:
    - id: filter
      shell: bash
      env:
        ENTRIES: ${{ inputs.entries }}
        SELECTIONS: ${{ inputs.selections }}
        KEY_FIELD: ${{ inputs.key-field }}
      run: |
        set -euo pipefail
        all=$(printf '%s' "$ENTRIES" | jq -sc .)
        sel_keys=$(printf '%s\n' "$SELECTIONS" \
          | sed '/^[[:space:]]*$/d' \
          | jq -R . | jq -sc .)
        if [ "$sel_keys" = "[]" ]; then
          picked="$all"
        elif [ -n "$KEY_FIELD" ]; then
          picked=$(jq -nc --argjson all "$all" --argjson sel "$sel_keys" --arg kf "$KEY_FIELD" '
            $all | map(select(.[$kf] as $k | $sel | index($k)))')
        else
          picked=$(jq -nc --argjson all "$all" --argjson sel "$sel_keys" '
            $all | map(select(. as $k | $sel | index($k)))')
        fi
        echo "matrix=$picked" >> "$GITHUB_OUTPUT"
        echo "matrix: $picked"
