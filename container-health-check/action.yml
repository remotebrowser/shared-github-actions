name: Container health check
description: >
  Build a Docker image, run it as a detached container, poll an HTTP health
  endpoint until a substring appears, dump container logs, and remove the
  container. Optionally loads env vars from Doppler and forwards every key
  into the container. Secrets stay in memory only — no --env-file on disk
  and no $GITHUB_ENV write across steps.

inputs:
  image-name:
    description: Docker image tag to build, e.g. `flyfleet`.
    required: true
  container-name:
    description: --name for `docker run`. Defaults to image-name.
    required: false
    default: ""
  dockerfile:
    description: Path passed to `docker build -f`.
    required: false
    default: Dockerfile
  context:
    description: Build context directory.
    required: false
    default: "."
  port-mapping:
    description: -p arg for `docker run`, e.g. `8300:8300`. Skipped when empty.
    required: false
    default: ""
  health-url:
    description: >
      URL polled with `curl -fs` until `health-match` appears in the body.
      Single-check shortcut. Ignored when `health-checks` is non-empty.
    required: false
    default: ""
  health-match:
    description: Substring required in the curl response body for `health-url`.
    required: false
    default: OK
  health-checks:
    description: >
      Multiple health endpoints to poll, one JSON object per line. Each
      object: `{"url": "...", "match": "..."}`. `match` is optional and
      defaults to `OK`. Checks run sequentially against the same container,
      each gets the full `health-timeout-seconds` budget. Use this instead
      of a follow-up curl step in your workflow — the container is removed
      in this action's `always()` step, so external polling after the
      action returns will fail. Wins over `health-url` when both are set.
    required: false
    default: ""
  health-timeout-seconds:
    description: Hard timeout for each health-check poll loop.
    required: false
    default: "180"
  doppler-token:
    description: Doppler API token. If empty, no Doppler load happens.
    required: false
    default: ""
  doppler-project:
    description: Doppler project name. Required when doppler-token is set.
    required: false
  doppler-config:
    description: Doppler config / environment name.
    required: false
    default: github
  extra-config:
    description: >
      Raw `docker run` flags appended verbatim to the command. One flag (or
      flag + value) per line. Blank lines and `#` comment lines are ignored;
      each remaining line is shell-split, so quoted values like
      `-e MSG="hello world"` work. Caller writes flags explicitly, e.g.
      `--network host`, `-e KEY=VALUE`, `-v /tmp/x:/x`. Any `-e KEY=...`
      here is appended after Doppler-derived `-e` flags, so it overrides
      the same key from Doppler. Workflow YAML is trusted, so values are
      `eval`-expanded — do not pass untrusted input.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Validate Doppler inputs
      if: inputs.doppler-token != ''
      shell: bash
      run: |
        if [ -z "${{ inputs.doppler-project }}" ]; then
          echo "doppler-token is set but doppler-project is missing." >&2
          exit 1
        fi

    - name: Install doppler-export
      if: inputs.doppler-token != ''
      shell: bash
      run: |
        mkdir -p "$HOME/.local/bin"
        install -m 0755 "$GITHUB_ACTION_PATH/../setup-doppler/doppler-export" "$HOME/.local/bin/doppler-export"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Build image
      shell: bash
      env:
        IMAGE: ${{ inputs.image-name }}
        DOCKERFILE: ${{ inputs.dockerfile }}
        CONTEXT: ${{ inputs.context }}
      run: docker build -t "$IMAGE" -f "$DOCKERFILE" "$CONTEXT"

    - name: Run container
      shell: bash
      env:
        IMAGE: ${{ inputs.image-name }}
        CONTAINER: ${{ inputs.container-name != '' && inputs.container-name || inputs.image-name }}
        PORT_MAPPING: ${{ inputs.port-mapping }}
        DOPPLER_TOKEN: ${{ inputs.doppler-token }}
        DOPPLER_PROJECT: ${{ inputs.doppler-project }}
        DOPPLER_CONFIG: ${{ inputs.doppler-config }}
        EXTRA_CONFIG: ${{ inputs.extra-config }}
      run: |
        set -euo pipefail
        env_args=()
        if [ -n "$DOPPLER_TOKEN" ]; then
          # Single Doppler call. shell format is `export KEY='VALUE'` per line.
          shell_out=$(doppler-export "$DOPPLER_PROJECT" "$DOPPLER_CONFIG" --format=shell)
          # Source into THIS shell only; values never touch disk and never enter $GITHUB_ENV.
          eval "$shell_out"
          while IFS= read -r k; do
            [ -n "$k" ] && env_args+=(-e "$k")
          done < <(sed -n "s/^export \([A-Za-z_][A-Za-z0-9_]*\)='.*'$/\1/p" <<<"$shell_out")
        fi
        port_args=()
        [ -n "$PORT_MAPPING" ] && port_args=(-p "$PORT_MAPPING")
        extra_args=()
        if [ -n "$EXTRA_CONFIG" ]; then
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            # eval to honor quoted values like `-e MSG="hello world"`.
            eval "extra_args+=($line)"
          done <<<"$EXTRA_CONFIG"
        fi
        docker run -d --name "$CONTAINER" "${port_args[@]}" "${env_args[@]}" "${extra_args[@]}" "$IMAGE"

    - name: Wait for health checks
      shell: bash
      env:
        HEALTH_URL: ${{ inputs.health-url }}
        HEALTH_MATCH: ${{ inputs.health-match }}
        HEALTH_CHECKS: ${{ inputs.health-checks }}
        HEALTH_TIMEOUT_SECONDS: ${{ inputs.health-timeout-seconds }}
      run: |
        set -euo pipefail
        if [ -n "$HEALTH_CHECKS" ]; then
          # Strip blank lines, then slurp into a JSON array. jq will fail with
          # a parse error if any line is malformed.
          checks=$(grep -v '^[[:space:]]*$' <<<"$HEALTH_CHECKS" | jq -s '.')
        elif [ -n "$HEALTH_URL" ]; then
          checks=$(jq -n --arg u "$HEALTH_URL" --arg m "$HEALTH_MATCH" \
            '[{url: $u, match: $m}]')
        else
          echo "Either health-url or health-checks must be set." >&2
          exit 1
        fi
        count=$(jq 'length' <<<"$checks")
        for i in $(seq 0 $((count - 1))); do
          url=$(jq -r ".[$i].url" <<<"$checks")
          match=$(jq -r ".[$i].match // \"OK\"" <<<"$checks")
          echo "Polling $url for '$match' (timeout ${HEALTH_TIMEOUT_SECONDS}s)..."
          # -fs (not -fsS): stay quiet during startup. Per-attempt errors are
          # noise — `timeout` non-zero plus the container logs in the next
          # step tell you what actually failed if the container never comes up.
          timeout "$HEALTH_TIMEOUT_SECONDS" bash -c \
            'until curl -fs "$1" | grep -q "$2"; do sleep 1; done' _ "$url" "$match"
        done

    - name: Container logs
      if: always()
      shell: bash
      env:
        CONTAINER: ${{ inputs.container-name != '' && inputs.container-name || inputs.image-name }}
      run: docker logs --details "$CONTAINER" || true

    - name: Remove container
      if: always()
      shell: bash
      env:
        CONTAINER: ${{ inputs.container-name != '' && inputs.container-name || inputs.image-name }}
      run: docker rm -f "$CONTAINER" || true
